name = "ai-capture-analyser"
main = "src/index.ts"
compatibility_date = "2026-03-23"
compatibility_flags = [ "nodejs_compat" ]

routes = [
  { pattern = "ai-capture-analyser.pierrefouquet.co.uk", custom_domain = true }
]

[placement]
mode = "targeted"
region = "aws:eu-west-2"

[assets]
directory = "./public"
binding = "ASSETS"

[ai]
binding = "AI"

[durable_objects]
bindings = [{ name = "ANALYSIS_OBJECT", class_name = "AnalysisObject" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = [ "AnalysisObject" ]

[observability]
enabled = true